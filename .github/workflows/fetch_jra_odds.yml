name: Fetch JRA Odds

on:
  workflow_dispatch:
    inputs:
      today_jst:
        description: '日付 (YYYY-MM-DD)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch JRA Odds
        env:
          IPAT_ID: ${{ secrets.IPAT_ID }}
          IPAT_PIN: ${{ secrets.IPAT_PIN }}
          IPAT_PARS: ${{ secrets.IPAT_PARS }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python .github/scripts/ipat_sp_final.py
