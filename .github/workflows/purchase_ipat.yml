name: IPAT Purchase

on:
  workflow_dispatch:
    inputs:
      course_name:
        description: '会場名（例: 東京(土)）'
        required: true
      race_num:
        description: 'レース番号'
        required: true
      bets:
        description: '買い目JSON（例: [{"num":3,"amount":1000}]）'
        required: true

jobs:
  purchase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run IPAT Purchase
        env:
          IPAT_ID: ${{ secrets.IPAT_ID }}
          IPAT_PIN: ${{ secrets.IPAT_PIN }}
          IPAT_PARS: ${{ secrets.IPAT_PARS }}
          COURSE_NAME: ${{ github.event.inputs.course_name }}
          RACE_NUM: ${{ github.event.inputs.race_num }}
          BETS: ${{ github.event.inputs.bets }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USER: muraking
          GH_REPO: keiba-kelly
          GH_BRANCH: main
          GH_FILE: data/indices.json
        run: python .github/scripts/ipat_purchase.py
