name: SPAT4 オッズ取得

on:
  workflow_dispatch:
    inputs:
      place_id:
        description: '場所ID'
        required: true
      race_num:
        description: 'レース番号'
        required: true
      race_date:
        description: '開催日 (YYYYMMDD)'
        required: true
      today_jst:
        description: '今日の日付 (YYYY-MM-DD)'
        required: true

jobs:
  fetch_odds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch Odds
        env:
          SPAT4_MEMBERNUM: ${{ secrets.SPAT4_MEMBERNUM }}
          SPAT4_PASS: ${{ secrets.SPAT4_PASS }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PLACE_ID: ${{ github.event.inputs.place_id }}
          RACE_NUM: ${{ github.event.inputs.race_num }}
          RACE_DATE: ${{ github.event.inputs.race_date }}
          TODAY_JST: ${{ github.event.inputs.today_jst }}
        run: python .github/scripts/fetch_odds_action.py
