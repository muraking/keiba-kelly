name: SPAT4 オッズ取得

on:
  workflow_dispatch:
    inputs:
      place_id:
        description: '競馬場ID'
        required: true
      race_num:
        description: 'レース番号'
        required: true
      race_date:
        description: '開催日 (YYYYMMDD)'
        required: true
      today_jst:
        description: '日付 (YYYY-MM-DD)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: オッズ取得
        env:
          SPAT4_COOKIES: ${{ secrets.SPAT4_COOKIES }}
          SPAT4_BASE_URL: ${{ secrets.SPAT4_BASE_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PLACE_ID: ${{ github.event.inputs.place_id }}
          RACE_NUM: ${{ github.event.inputs.race_num }}
          RACE_DATE: ${{ github.event.inputs.race_date }}
          TODAY_JST: ${{ github.event.inputs.today_jst }}
        run: python .github/scripts/fetch_odds_action.py
