<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="競馬Kelly">
<meta name="theme-color" content="#0f0f0f">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>競馬ケリーアナライザー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f0f0f;--bg2:#191919;--bg3:#222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ede8;--text2:#8a8680;--text3:#4a4845;
  --gold:#d4af6a;--gold2:#b8934a;
  --green:#4ade80;--green-bg:rgba(74,222,128,0.09);--green-bd:rgba(74,222,128,0.22);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.09);--blue-bd:rgba(96,165,250,0.22);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.09);
  --red:#f87171;--red-bg:rgba(248,113,113,0.09);
  --r:10px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{max-width:430px;margin:0 auto;padding-bottom:90px}

/* header */
.hdr{padding:18px 16px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.hdr-ico{width:38px;height:38px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-ico svg{width:22px;height:22px}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:-.02em}
.hdr p{font-size:11px;color:var(--text2);margin-top:1px}

/* nav */
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:10px 12px;border-bottom:0.5px solid var(--border);background:var(--bg)}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:transparent;color:var(--text3);border-radius:var(--r);cursor:pointer;font-size:10px;font-family:inherit;transition:.15s;position:relative}
.nb.on{background:var(--bg3);color:var(--gold)}
.nb .dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:none;position:absolute;top:5px;right:calc(50% - 16px)}
.nb.done .dot{display:block}
.nb-ico{font-size:20px}

/* page */
.page{display:none;padding:16px}
.page.on{display:block}

/* typography */
.sh{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sh::after{content:'';flex:1;height:0.5px;background:var(--border)}
.hint{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.7}

/* form */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
input[type=number],input[type=text]{width:100%;height:44px;padding:0 14px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus{border-color:var(--gold)}
textarea{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:12px;font-family:'DM Mono',monospace;padding:12px;resize:none;outline:none;line-height:1.8;transition:border-color .15s}
textarea:focus{border-color:var(--gold)}

/* buttons */
.btn{width:100%;height:48px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn:active{transform:scale(0.98);opacity:.9}
.btn-gold{background:var(--gold);color:#0f0f0f}
.btn-green{background:var(--green);color:#0f0f0f}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--text2);height:40px;font-size:13px}
.btn-sm{height:40px;font-size:13px}

/* odds table */
.odds-hd{display:grid;grid-template-columns:30px 1fr 80px;gap:6px;padding:0 4px 8px;border-bottom:0.5px solid var(--border);margin-bottom:10px}
.odds-hd span{font-size:10px;color:var(--text3);text-align:center;font-weight:500;letter-spacing:.04em}
.odds-hd span:nth-child(2){text-align:left}
.orow{display:grid;grid-template-columns:30px 1fr 80px;gap:6px;align-items:center;margin-bottom:9px}
.num-b{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);color:var(--gold);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.orow .hn{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi{width:100%;height:38px;padding:0 6px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;text-align:center;outline:none;-webkit-appearance:none;transition:border-color .15s}
.mi:focus{border-color:var(--gold)}

/* paste mode */
.paste-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.paste-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.paste-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);width:24px;text-align:right;flex-shrink:0}
.paste-name{flex:1;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.paste-odds{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:148px;flex-shrink:0}
.paste-label{font-size:9px;color:var(--text3);margin-bottom:2px;text-align:center;letter-spacing:.04em}

/* workflow card */
.wf-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.wf-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.wf-step:last-child{margin-bottom:0}
.wf-num{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#0f0f0f;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wf-body h3{font-size:13px;font-weight:700;margin-bottom:3px}
.wf-body p{font-size:12px;color:var(--text2);line-height:1.6}
.wf-body code{font-family:'DM Mono',monospace;font-size:11px;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--gold)}

/* result */
.rc{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.rc.main::before{background:var(--green)}
.rc.sub::before{background:var(--blue)}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rc-top .num-b{width:34px;height:34px;font-size:14px}
.rc-top .hn{flex:1;font-size:15px;font-weight:700}
.badge{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:700;letter-spacing:.04em}
.badge-g{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green-bd)}
.badge-b{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd)}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sm{background:var(--bg3);border-radius:var(--r);padding:10px 12px}
.sm .sl{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500;letter-spacing:.03em}
.sm .sv{font-size:19px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.sv.g{color:var(--green)}.sv.a{color:var(--amber)}.sv.b{color:var(--blue)}
.divider{height:0.5px;background:var(--border);margin:10px 0}
.brow{display:flex;align-items:center;justify-content:space-between;padding:7px 0}
.brow-label{font-size:12px;color:var(--text2)}
.chip{font-size:12px;font-weight:700;padding:5px 12px;border-radius:99px;font-family:'DM Mono',monospace}
.chip-g{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green-bd)}
.chip-b{background:var(--blue-bg);color:var(--blue);border:0.5px solid var(--blue-bd)}
.chip-na{background:var(--bg3);color:var(--text3);font-size:11px}
.total-box{background:var(--bg3);border-radius:var(--r2);padding:14px;margin-bottom:16px}
.ev-row{display:grid;grid-template-columns:30px 1fr 46px 46px;gap:6px;align-items:center;padding:8px 4px;border-bottom:0.5px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.ev-num{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;font-weight:700;text-align:center}
.ev-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-pct{font-size:11px;color:var(--text3);text-align:right;font-family:'DM Mono',monospace}
.ev-val{font-size:12px;font-weight:700;text-align:right;font-family:'DM Mono',monospace}
.ev-val.hi{color:var(--green)}.ev-val.mid{color:var(--amber)}.ev-val.lo{color:var(--text3)}
.msg{text-align:center;padding:30px 16px;color:var(--text2);font-size:13px;line-height:1.7}
.race-tag{display:inline-flex;align-items:center;gap:6px;background:var(--amber-bg);border:0.5px solid rgba(251,191,36,.2);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--amber);font-weight:500;margin-bottom:14px}
.seg{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:14px}
.seg-btn{flex:1;height:34px;border:none;background:transparent;color:var(--text2);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:.15s}
.seg-btn.on{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.status{padding:10px 12px;border-radius:var(--r);font-size:12px;margin-bottom:10px;line-height:1.5}
.st-ok{background:var(--green-bg);border:0.5px solid var(--green-bd);color:var(--green)}
.st-warn{background:var(--amber-bg);border:0.5px solid rgba(251,191,36,.2);color:var(--amber)}

#pw-screen{position:fixed;inset:0;background:#0f0f0f;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.pw-icon{width:56px;height:56px;background:#d4af6a;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.pw-icon svg{width:30px;height:30px}
.pw-title{font-size:18px;font-weight:700;color:#f0ede8;margin-bottom:6px;letter-spacing:-.02em}
.pw-sub{font-size:12px;color:#8a8680;margin-bottom:28px}
.pw-input{width:100%;max-width:280px;height:48px;background:#191919;border:0.5px solid rgba(255,255,255,0.15);border-radius:12px;color:#f0ede8;font-size:16px;text-align:center;font-family:inherit;outline:none;letter-spacing:.1em;margin-bottom:12px;-webkit-appearance:none}
.pw-input:focus{border-color:#d4af6a}
.pw-btn{width:100%;max-width:280px;height:48px;background:#d4af6a;color:#0f0f0f;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.pw-err{font-size:12px;color:#f87171;margin-top:8px;min-height:18px}

.pw-input+.pw-input{margin-top:8px}
.kelly-btn{height:44px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:.15s;line-height:1.4;width:100%}
.kelly-btn:active{transform:scale(.97)}
.kelly-on{background:var(--gold) !important;color:#0f0f0f !important;border-color:var(--gold) !important;font-weight:700 !important}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--green);color:#0f0f0f;padding:10px 20px;border-radius:99px;
  font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;
  white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#purchase-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px}
#purchase-modal.show{display:flex}
.modal-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);padding:20px;width:100%;max-width:360px}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.modal-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.modal-row:last-of-type{border-bottom:none}
.modal-total{font-size:16px;font-weight:700;color:var(--green);font-family:'DM Mono',monospace}
.modal-status{margin-top:12px;padding:10px;background:var(--bg3);border-radius:var(--r);font-size:13px;text-align:center;min-height:36px}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="pw-title">競馬ケリーアナライザー</div>
  <div class="pw-sub">ユーザーIDとパスワードを入力してください</div>
  <input class="pw-input" type="text" id="user-id-input" placeholder="ユーザーID" autocomplete="off"
    style="margin-bottom:8px"
    onkeydown="if(event.key==='Enter')document.getElementById('pw-input').focus()">
  <input class="pw-input" type="password" id="pw-input" placeholder="パスワード" autocomplete="off"
    onkeydown="if(event.key==='Enter')checkPw()">
  <button class="pw-btn" onclick="checkPw()">ログイン</button>
  <div class="pw-err" id="pw-err"></div>
</div>

<div class="app">
  <div class="hdr">
    <div class="hdr-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round">
        <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div>
      <h1>競馬ケリーアナライザー</h1>
      <p>指数×オッズ 期待値 ＋ ハーフケリー計算</p>
    </div>
  </div>

  <nav class="nav">
    <button class="nb on" onclick="sw('setup')" id="nb-setup">
      <div class="dot"></div><span class="nb-ico">⚙️</span><span>設定</span>
    </button>
    <button class="nb" onclick="sw('odds')" id="nb-odds">
      <div class="dot"></div><span class="nb-ico">📊</span><span>オッズ</span>
    </button>
    <button class="nb" onclick="sw('result')" id="nb-result">
      <div class="dot"></div><span class="nb-ico">🏆</span><span>結果</span>
    </button>
    <button class="nb" onclick="sw('admin')" id="nb-admin" style="display:none">
      <div class="dot"></div><span class="nb-ico">☁️</span><span>共有</span>
    </button>
  </nav>

  <!-- 設定 -->
  <div id="p-setup" class="page on">
    <div style="margin-bottom:20px">
      <div class="sh">資金設定</div>
      <div class="field"><label>総資金（円）</label>
        <input type="number" id="fund" placeholder="例: 10000" inputmode="numeric">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field" style="margin-bottom:0">
          <label>最大購入点数</label>
          <select id="max-bets" style="width:100%;height:40px;padding:0 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit">
            <option value="1">1点</option>
            <option value="2">2点</option>
            <option value="3">3点</option>
            <option value="4" selected>4点</option>
            <option value="5">5点</option>
            <option value="6">6点</option>
            <option value="7">7点</option>
            <option value="8">8点</option>
            <option value="99">制限なし</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>最大投資額（円）</label>
          <input type="number" id="max-invest" placeholder="制限なし" inputmode="numeric" style="height:40px">
        </div>
      </div>
      <div class="field" style="margin-top:10px;margin-bottom:0">
        <label>ケリー基準</label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px">
          <button id="kelly-half" class="kelly-btn kelly-on" onclick="setKelly('half')">
            <div style="font-size:13px">ハーフ</div>
            <div style="font-size:10px;margin-top:2px">×1/2</div>
            <div id="ki-half" style="font-size:11px;margin-top:2px">✓</div>
          </button>
          <button id="kelly-quarter" class="kelly-btn" onclick="setKelly('quarter')">
            <div style="font-size:13px">クォーター</div>
            <div style="font-size:10px;margin-top:2px">×1/4</div>
            <div id="ki-quarter" style="font-size:11px;margin-top:2px;visibility:hidden">✓</div>
          </button>
          <button id="kelly-full" class="kelly-btn" onclick="setKelly('full')">
            <div style="font-size:13px">フル</div>
            <div style="font-size:10px;margin-top:2px">×1/1</div>
            <div id="ki-full" style="font-size:11px;margin-top:2px;visibility:hidden">✓</div>
          </button>
        </div>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <div class="sh">GitHubからレースを選択</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <button class="btn btn-gold" onclick="fetchRaceList()" id="fetch-btn">
          ↓ 一覧を読み込む
        </button>
        <button class="btn btn-outline" onclick="selectNearestRace()" id="nearest-btn" style="height:48px;font-size:13px">
          ⏱ 直近レース
        </button>
      </div>
      <div id="fetch-status"></div>
      <div id="date-area" style="display:none">
        <div class="field" style="margin-top:10px">
          <label>日付</label>
          <select id="date-select" onchange="onDateChange()" style="width:100%;height:40px;padding:0 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit">
            <option value="">-- 日付を選択 --</option>
          </select>
        </div>
        <div class="field" id="race-select-area" style="display:none">
          <label>レース</label>
          <select id="race-select" onchange="onRaceChange()" style="width:100%;height:40px;padding:0 10px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit">
            <option value="">-- レースを選択 --</option>
          </select>
        </div>
      </div>
    </div>

    <div id="horse-preview" style="display:none;margin-bottom:20px">
      <div class="sh">出走馬・正規化勝率</div>
      <div id="odds-info-bar" style="display:none;background:var(--amber-bg);border:0.5px solid rgba(251,191,36,.2);border-radius:var(--r);padding:8px 12px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span id="odds-updated-label" style="font-size:11px;color:var(--amber)">オッズ取得時刻: −</span>
          <button onclick="refreshOdds()" style="background:var(--amber-bg);border:0.5px solid rgba(251,191,36,.3);color:var(--amber);border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit">🔄 最新に更新</button>
        </div>
        <button id="fetch-odds-btn" onclick="triggerOddsFetch()" style="width:100%;background:var(--green);color:#0f0f0f;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
          📡 オッズを今すぐ取得（地方競馬のみ）
        </button>
        <div id="fetch-odds-status" style="margin-top:6px;font-size:11px"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <button class="btn btn-green" onclick="goToOddsWithData()">
          📊 オッズ反映
        </button>
        <button class="btn btn-outline" onclick="goToOddsClear()">
          ✏️ オッズ入力
        </button>
      </div>
      <div id="horse-list"></div>
    </div>



  </div>

  <!-- オッズ -->
  <div id="p-odds" class="page">
    <div id="odds-race-tag"></div>

    <!-- モード切替 -->


    <!-- 手動入力モード -->
    <div id="mode-manual">

      <div class="sh" style="display:flex;align-items:center;justify-content:space-between">
        <span>オッズ入力</span>
        <button onclick="clearOdds()" style="background:transparent;border:0.5px solid rgba(248,113,113,0.5);color:#f87171;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;line-height:1.4">✕ クリア</button>
      </div>
      <div class="odds-hd">
        <span></span><span>馬名</span><span>単勝</span>
      </div>
      <div id="manual-inputs"></div>
      <div style="height:12px"></div>
      <button class="btn btn-green" onclick="calcAll()">✦ 計算して結果を見る</button>
    </div>

    <!-- テキスト貼付モード -->

  </div>

  <!-- 結果 -->

  <div id="p-admin" class="page">
    <div style="margin-bottom:16px">
      <div class="sh">GitHub共有設定</div>
      <div class="field">
        <label>Personal Access Token（初回のみ）</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxx..." autocomplete="off">
        <p style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6">端末のlocalStorageにのみ保存。GitHub上には公開されません。</p>
      </div>
      <button class="btn btn-outline" style="height:38px;font-size:13px;margin-bottom:16px" onclick="saveToken()">トークンを保存</button>
    </div>

    <div style="margin-bottom:16px">
      <div class="sh">指数データを保存（管理者）</div>
      <p class="hint">予想サイトから全レース分のテキストをまとめて貼り付け。日付を指定して保存できます。</p>
      <div class="field">
        <label>対象日付（空欄=今日の日本時間）</label>
        <input type="date" id="admin-date" style="width:100%;height:40px;padding:0 12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit">
      </div>
      <div class="field">
        <label>指数テキスト（全レース分まとめて）</label>
        <textarea id="admin-raw" rows="10" placeholder="2026/5/6 門別 1R C4ー3 14:20 ダ1000 右 晴 良 [21.8]
◎ 5 【72.2%】 アークオブライフ 小野楓馬 NaN [72.2];
○ 6 【49.4%】 フレアリングバロン 桑村真明 NaN [61.8];
...
2026/5/6 門別 2R ...
◎ 10 【72.6%】 セイランマクフィ ..."></textarea>
      </div>
      <button class="btn btn-green" onclick="saveToGitHub()" id="save-btn">
        ☁ GitHubに保存して共有
      </button>
      <div id="save-status" style="margin-top:10px"></div>
    </div>

    <div>
      <div class="sh">保存済みデータ管理（管理者）</div>
      <button class="btn btn-outline" onclick="loadDateList()" style="height:38px;font-size:13px;margin-bottom:10px">
        一覧を表示・更新
      </button>
      <div id="date-list-area"></div>
    </div>
  </div>

  <div id="p-result" class="page">
    <div id="res-content">
      <div class="msg">設定・オッズを入力して<br>計算ボタンを押してください</div>
    </div>
  </div>
</div>

<script>
let horses=[], mode='manual';
let currentRace = null;  // グローバル：calcAllから参照

function sw(t){
  ['setup','odds','result','admin'].forEach(n=>{
    document.getElementById('p-'+n).classList.toggle('on',n===t);
    document.getElementById('nb-'+n).classList.toggle('on',n===t);
  });
  window.scrollTo(0,0);
  // 設定タブに戻る時はオッズをghDataから再読み込み
  if(t === 'setup' && horses.length > 0){
    const date = document.getElementById('date-select')?.value;
    const idx = document.getElementById('race-select')?.value;
    if(date && idx !== '') onRaceChange();
  }
}

function setMode(m){
  mode=m;
  const manual = document.getElementById('mode-manual');
  if(manual) manual.style.display='block'; // 常に表示
}

function parseData(){
  const raw=document.getElementById('raw').value.trim();
  if(!raw){alert('データを貼り付けてください');return;}
  // セミコロン・改行どちらでも分割、体重データ(数字(±数字))にも対応
  const lines=raw.split(/[;\n]/).filter(l=>l.trim());
  const parsed=[];
  for(const line of lines){
    // 体重あり形式: 馬名 騎手 453(+4)
    let m=line.match(/[◎○▲△☆－]\s+(\d+)\s+【\s*([\d.]+)%】\s+(.+?)\s+(\S+)\s+\d+\([+-]?\d+\)/);
    // NaN形式（旧）
    if(!m) m=line.match(/[◎○▲△☆－]\s+(\d+)\s+【\s*([\d.]+)%】\s+(.+?)\s+\S+\s+NaN/);
    if(m) parsed.push({num:parseInt(m[1]),pct:parseFloat(m[2]),name:m[3].trim(),tanOdds:null,fukuOdds:null});
  }
  if(!parsed.length){alert('データを読み取れませんでした\n形式を確認してください');return;}
  horses=parsed;
  const tot=horses.reduce((s,h)=>s+h.pct,0);
  horses.forEach(h=>{h.norm=h.pct/tot});
  horses.sort((a,b)=>b.norm-a.norm);

  const rname=document.getElementById('rname').value.trim();
  currentRaceName = rname;
  document.getElementById('odds-race-tag').innerHTML=rname
    ?`<div class="race-tag">◎ ${rname}</div>`:'';

  buildManual();
  document.getElementById('nb-setup').classList.add('done');
  sw('odds');
}

function buildManual(){
  const c=document.getElementById('manual-inputs');
  c.innerHTML='';
  // 馬番順でソート
  const sortedHorses=[...horses].sort((a,b)=>a.num-b.num);
  for(const h of sortedHorses){
    const row=document.createElement('div');
    row.className='orow';
    row.innerHTML=`<div class="num-b">${h.num}</div>
      <span class="hn" title="${h.name}">${h.name}</span>
      <input class="mi" type="number" id="t-${h.num}" placeholder="−" step="0.1" min="1" inputmode="decimal" value="${h.tanOdds||''}"
        onkeydown="oddsEnterNext(event,'t-${h.num}')">`;
    c.appendChild(row);
  }
}

function parsePaste(){
  if(!horses.length){alert('先に設定タブで指数を読み込んでください');return;}
  const text=document.getElementById('paste-text').value.trim();
  if(!text){alert('テキストを貼り付けてください');return;}
  const lines=text.split('\n').filter(l=>l.trim());
  let found=0;

  // 馬番→オッズ の候補マップを構築（SPAT4両形式・oddspark・netkeiba対応）
  const candidates={};

  for(const line of lines){
    const trimmed=line.trim();
    if(!trimmed) continue;
    // 先頭の馬番を取得
    const headM=trimmed.match(/^(\d+)[\s　]/);
    if(!headM) continue;
    const num=parseInt(headM[1]);
    if(num<1||num>30) continue;
    const h=horses.find(x=>x.num===num);
    if(!h) continue;

    // トークンに分割して数値候補を抽出
    // ハイフン含むトークン（複勝範囲 "4.1-7.5"）は除外
    const tokens=trimmed.split(/\s+/).slice(1);
    const oddsNums=[];
    for(const t of tokens){
      if(t.includes('-')) continue; // 複勝範囲スキップ
      const v=parseFloat(t.replace(/[^\d.]/g,''));
      if(!isNaN(v)&&v>=1.0&&v<1000) oddsNums.push(v);
    }
    if(oddsNums.length&&!candidates[num]){
      // 最初の有効数値が単勝オッズ
      candidates[num]=oddsNums[0];
    }
  }

  // 候補を馬に反映
  for(const [num, odds] of Object.entries(candidates)){
    const h=horses.find(x=>x.num===parseInt(num));
    if(h){h.tanOdds=odds;found++;}
  }

  buildManual();
  const st=document.getElementById('paste-status');
  if(found>0){
    st.innerHTML=`<div class="status st-ok">✓ ${found}頭のオッズを反映しました。手動入力タブで確認・修正できます</div>`;
    setTimeout(()=>setMode('manual'),1200);
  } else {
    st.innerHTML=`<div class="status st-warn">⚠ オッズを読み取れませんでした。形式を確認してください<br><span style="font-size:11px">例: 1,3.5,1.4 または 1番 単3.5 複1.4</span></div>`;
  }
}

let kellyFraction = 0.5; // default: half kelly

function setKelly(type){
  kellyFraction = type==='full'?1.0:type==='quarter'?0.25:0.5;
  ['half','quarter','full'].forEach(t=>{
    const btn=document.getElementById('kelly-'+t);
    const ind=document.getElementById('ki-'+t);
    if(btn) btn.classList.toggle('kelly-on', t===type);
    if(ind) ind.style.visibility = t===type ? 'visible' : 'hidden';
  });
}

function halfKelly(p,odds){
  const b=odds-1,q=1-p,k=(b*p-q)/b;
  return Math.max(0,k*kellyFraction);
}

function calcAll(){
  for(const h of horses){
    const tv=document.getElementById('t-'+h.num)?.value;
    // 手動入力がある場合はそちらを優先、なければ取得済みオッズを維持
    if(tv) h.tanOdds=parseFloat(tv);
    // fukuOddsはリセットしない（取得済みの複勝オッズを保持）
    h.tanEV=h.tanOdds?h.norm*h.tanOdds*100:null;
  }

  const fund=parseInt(document.getElementById('fund').value)||0;
  const rname=(typeof currentRaceName!=='undefined'&&currentRaceName)||'レース分析';
  if(!fund){alert('資金を入力してください');sw('setup');return;}

  const maxBets = parseInt(document.getElementById('max-bets')?.value)||4;
  const maxInvest = parseInt(document.getElementById('max-invest')?.value)||Infinity;

  // 期待値105以上の馬を抽出して勝率順（最大maxBets頭）
  const evPool = [...horses]
    .filter(h=>h.tanEV && h.tanEV >= 105)
    .sort((a,b)=>b.norm-a.norm);  // 勝率高い順

  renders = [];
  renders = evPool.slice(0, maxBets).map((h,i)=>({...h,_t:'main',_r:i+1}));

  const raceClassLabel = (typeof currentRaceClass!=='undefined'&&currentRaceClass)?` ${currentRaceClass}`:'';
  const startTimeLabel = (typeof currentStartTime!=='undefined'&&currentStartTime)?` 発走${currentStartTime}`:'';

  // 単複推奨パターンを計算（勝率上位5頭から期待値最高の1頭）
  const top5byNorm = [...horses].filter(h=>h.tanOdds).sort((a,b)=>b.norm-a.norm).slice(0,5);
  const tanfukuPick = top5byNorm.filter(h=>h.tanEV&&h.tanEV>100).sort((a,b)=>b.tanEV-a.tanEV)[0]||null;
  let tanfukuHtml = '';
  if(tanfukuPick){
    const tf = tanfukuPick;
    const tfKf = halfKelly(tf.norm, tf.tanOdds);
    const tfBet = tfKf>0?Math.max(100,Math.floor(fund*tfKf/100)*100):0;
    const tfPayout = tfBet>0?Math.round(tfBet*tf.tanOdds):0;
    // 複勝オッズがある場合
    const tfFukuOdds = tf.fukuOdds||null;
    const tfFukuKf = tfFukuOdds?halfKelly(tf.norm*1.5, tfFukuOdds):0;
    const tfFukuBet = tfFukuKf>0?Math.max(100,Math.floor(fund*tfFukuKf/100)*100):0;
    const tfTotal = tfBet + tfFukuBet;
    tanfukuHtml = `
      <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);overflow:hidden;margin-bottom:12px">
        <div style="padding:12px 14px;border-bottom:0.5px solid var(--border2)">
          <div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);margin-bottom:8px">単複推奨（勝率上位5頭中 期待値最高）</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:30px;height:30px;border-radius:50%;background:var(--bg3);color:var(--gold);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;flex-shrink:0">${tf.num}</div>
            <div style="flex:1">
              <div style="font-size:15px;font-weight:700;color:var(--text)">${tf.name}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:1px">正規化勝率 ${(tf.norm*100).toFixed(1)}%　単勝期待値 ${tf.tanEV.toFixed(0)}</div>
            </div>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--bg3)">
              <th style="padding:7px 14px;text-align:left;font-size:10px;color:var(--text3);font-weight:500">券種</th>
              <th style="padding:7px 10px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">オッズ</th>
              <th style="padding:7px 10px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">掛け金</th>
              <th style="padding:7px 14px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">払戻</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom:0.5px solid var(--border)">
              <td style="padding:10px 14px;font-size:13px;color:var(--text);font-weight:500">単勝</td>
              <td style="padding:10px 10px;text-align:right;font-size:13px;color:var(--text2);font-family:'DM Mono',monospace">${tf.tanOdds}倍</td>
              <td style="padding:10px 10px;text-align:right;font-size:14px;font-weight:700;color:var(--green);font-family:'DM Mono',monospace">¥${tfBet.toLocaleString()}</td>
              <td style="padding:10px 14px;text-align:right;font-size:13px;color:var(--text2);font-family:'DM Mono',monospace">¥${tfPayout.toLocaleString()}</td>
            </tr>
            <tr style="border-bottom:0.5px solid var(--border)">
              <td style="padding:10px 14px;font-size:13px;color:var(--text);font-weight:500">複勝</td>
              <td style="padding:8px 10px;text-align:right">
                <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px">
                  <input id="tf-fuku-input" type="number" step="0.1" min="1"
                    value="${tfFukuOdds||''}"
                    placeholder="入力"
                    inputmode="decimal"
                    style="width:64px;height:32px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;text-align:right;padding:0 6px"
                    onchange="recalcTanfuku()" oninput="recalcTanfuku()">
                  <span style="font-size:12px;color:var(--text3)">倍</span>
                </div>
              </td>
              <td id="tf-fuku-bet" style="padding:10px 10px;text-align:right;font-size:14px;font-weight:700;color:var(--blue);font-family:'DM Mono',monospace">${tfFukuBet>0?'¥'+tfFukuBet.toLocaleString():'−'}</td>
              <td id="tf-fuku-payout" style="padding:10px 14px;text-align:right;font-size:13px;color:var(--text2);font-family:'DM Mono',monospace">${tfFukuBet>0?'¥'+Math.round(tfFukuBet*tfFukuOdds).toLocaleString():'−'}</td>
            </tr>
          </tbody>
        </table>
        <div style="padding:10px 14px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--text2)">合計投資額</span>
          <span id="tf-total" style="font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)">¥${tfTotal.toLocaleString()}</span>
        </div>
      </div>`;
  }

  let html=`<div class="race-tag" style="margin-bottom:10px">◎ ${rname}${raceClassLabel}${startTimeLabel}</div>`;

  // モード切替タブ
  html+=`<div class="seg" style="margin-bottom:14px">
    <button class="seg-btn on" id="mode-kelly" onclick="switchResultMode('kelly')">ケリー買い目</button>
    <button class="seg-btn" id="mode-tanfuku" onclick="switchResultMode('tanfuku')">単複推奨</button>
  </div>
  <div id="result-kelly">`;

  // ===== 賭け額計算（正確な順序で実行）=====
  // Step1: ケリー基準で初期賭け額を計算
  betMap={};
  renders.forEach(h=>{
    if(!h.tanOdds){betMap[h.num]=0;return;}
    const kf=halfKelly(h.norm,h.tanOdds);
    betMap[h.num]=kf>0?Math.max(100,Math.floor(fund*kf/100)*100):0;
  });

  // Step2: 最大投資額で按分（先にここで上限を守る）
  let ttl=Object.values(betMap).reduce((s,v)=>s+v,0);
  if(isFinite(maxInvest)&&ttl>maxInvest){
    const scale=maxInvest/ttl;
    renders.forEach(h=>{
      if(betMap[h.num]>0) betMap[h.num]=Math.max(100,Math.floor(betMap[h.num]*scale/100)*100);
    });
    ttl=Object.values(betMap).reduce((s,v)=>s+v,0);
  }

  // Step3: トリガミ排除（払戻 > 合計投資額 になるよう調整）
  // ※最大投資額を超えないよう上限付きで調整
  let changed=true,safetyCount=0;
  while(changed&&safetyCount<10){
    changed=false; safetyCount++;
    const curTtl=Object.values(betMap).reduce((s,v)=>s+v,0);
    renders.forEach(h=>{
      if(!betMap[h.num]||!h.tanOdds) return;
      const payout=betMap[h.num]*h.tanOdds;
      if(payout<=curTtl){
        const minBet=Math.ceil((curTtl+100)/h.tanOdds/100)*100;
        // 最大投資額を超えずかつ資金80%以内なら増額、それ以外は除外
        const limit=isFinite(maxInvest)?Math.min(fund*0.8,maxInvest):fund*0.8;
        if(minBet<=limit){
          betMap[h.num]=minBet; changed=true;
        } else {
          betMap[h.num]=0; changed=true;
        }
      }
    });
  }

  // Step4: トリガミ調整後に最大投資額を再チェック
  ttl=Object.values(betMap).reduce((s,v)=>s+v,0);
  if(isFinite(maxInvest)&&ttl>maxInvest){
    const scale=maxInvest/ttl;
    renders.forEach(h=>{
      if(betMap[h.num]>0) betMap[h.num]=Math.max(100,Math.floor(betMap[h.num]*scale/100)*100);
    });
    ttl=Object.values(betMap).reduce((s,v)=>s+v,0);
  }
  // ==========

  if(!renders.length||!Object.values(betMap).some(v=>v>0)){
    html+='<div class="msg">期待値100超の馬が見つかりません</div>';
  } else {
    // ===== 結果テーブル =====
    const rate=fund>0?(ttl/fund*100).toFixed(1):0;
    html+=`<div class="total-box" style="margin-bottom:14px">
      <div class="sg">
        <div class="sm"><div class="sl">合計投資額</div><div class="sv">¥${ttl.toLocaleString()}</div></div>
        <div class="sm"><div class="sl">資金使用率</div><div class="sv ${parseFloat(rate)>30?'a':'g'}">${rate}%</div></div>
      </div>
    </div>`;
    // 管理者のみ購入ボタンを表示（地方競馬のみ・中央競馬は非表示）
    const JRA_VENUES_BTN = ['札幌','函館','福島','新潟','東京','中山','中京','京都','阪神','小倉'];
    const _race = currentRace || (ghData[document.getElementById('date-select').value]?.races[parseInt(document.getElementById('race-select').value)]);
    if(isAdmin && ttl > 0 && _race){
      const isJRAVenue = JRA_VENUES_BTN.includes(_race.venue);
      const btnLabel = isJRAVenue ? '🏇 IPATで購入する' : '🛒 SPAT4で購入する';
      const btnFn = isJRAVenue ? 'executePurchaseJRA()' : 'executePurchase()';
      html+=`<button class="btn btn-gold" style="margin-bottom:14px;font-size:14px;font-weight:700"
        onclick="${btnFn}">${btnLabel}</button>
        <div id="purchase-status" style="margin-top:-8px;margin-bottom:14px;font-size:12px"></div>`;
    }

    // 1番人気警告
    const allTanOdds = renders.map(h=>h.tanOdds).filter(Boolean);
    const favOdds = allTanOdds.length ? Math.min(...allTanOdds) : null;
    // horses全体からも確認
    const allHorseTan = horses.map(h=>h.tanOdds).filter(Boolean);
    const globalFavOdds = allHorseTan.length ? Math.min(...allHorseTan) : null;
    if(globalFavOdds && globalFavOdds < 2.0){
      html+=`<div style="background:rgba(251,191,36,.1);border:0.5px solid rgba(251,191,36,.4);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--amber)">
        ⚠️ 1番人気は${globalFavOdds}倍です。購入前に確認してください。
      </div>`;
    }

    // 買い目テーブル
    html+=`<div class="sh">買い目</div>
    <div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r2);overflow:hidden;margin-bottom:16px">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:0.5px solid var(--border2)">
            <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:500">馬番・馬名</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">勝率</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">オッズ</th>
            <th style="padding:8px 6px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">期待値</th>
            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3);font-weight:500">賭け額</th>
          </tr>
        </thead>

async function hashStr(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const GH_USER = 'muraking';

const GH_DISPATCH_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/actions/workflows/fetch_odds.yml/dispatches`;

// 日本時間で今日の日付を取得
function getTodayJST(){
  const now = new Date();
  const jst = new Date(now.getTime() + 9*60*60*1000);
  return jst.toISOString().split('T')[0];
}

function saveToken(){
  const t = document.getElementById('gh-token').value.trim();
  if(!t){alert('トークンを入力してください');return;}
  localStorage.setItem('kk_gh_token', t);
  document.getElementById('gh-token').value = '';
  document.getElementById('gh-token').placeholder = 'トークン保存済み（変更する場合のみ入力）';
  alert('トークンを保存しました');
}

function loadToken(){
  return localStorage.getItem('kk_gh_token') || '';
}

// 現在のJSONをGitHubから取得（SHA付き）
async function getCurrentData(token){
  try {
    const r = await fetch(GH_API, { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }});
    if(!r.ok) return { sha: null, data: { dates: {} } };
    const meta = await r.json();
    const content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
    // 旧フォーマット（単一日付）を新フォーマットに変換
    if(!content.dates){
      const dates = {};
      if(content.date && content.races && content.races.length){
        dates[content.date] = { races: content.races, updated: content.updated };
      }
      return { sha: meta.sha, data: { dates } };
    }
    return { sha: meta.sha, data: content };
  } catch(e){
    return { sha: null, data: { dates: {} } };
  }
}

async function saveToGitHub(){
  const token = loadToken();
  if(!token){ alert('先にトークンを保存してください'); return; }
  const raw = document.getElementById('admin-raw').value.trim();
  if(!raw){ alert('指数データを貼り付けてください'); return; }

  const btn = document.getElementById('save-btn');
  const st = document.getElementById('save-status');
  btn.disabled = true;
  st.innerHTML = '<div class="status st-warn">... GitHubに保存中...</div>';

  const allRaces = parseAllRaces(raw);
  if(!allRaces.length){
    st.innerHTML = '<div class="status st-err">レースデータを読み取れませんでした</div>';
    btn.disabled = false; return;
  }

  // 日付入力欄から日付を取得（なければJST今日）
  const dateInput = document.getElementById('admin-date').value;
  const targetDate = dateInput || getTodayJST();

  try {
    const { sha, data } = await getCurrentData(token);
    // 指定日付のデータを追記・上書き
    data.dates[targetDate] = { races: allRaces, updated: new Date().toISOString() };

    const json = JSON.stringify(data, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    const body = { message: `Update indices ${targetDate}`, content: encoded, branch: GH_BRANCH };
    if(sha) body.sha = sha;

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(res.ok){
      const dateCount = Object.keys(data.dates).length;
      st.innerHTML = `<div class="status st-ok">✓ ${targetDate} に ${allRaces.length}レースを保存しました（計${dateCount}日分）</div>`;
      document.getElementById('admin-raw').value = '';
    } else {
      const err = await res.json();
      st.innerHTML = `<div class="status st-err">エラー: ${err.message}</div>`;
    }
  } catch(e){
    st.innerHTML = `<div class="status st-err">通信エラー: ${e.message}</div>`;
  }
  btn.disabled = false;
}

async function deleteDate(date){
  if(!confirm(`${date} のデータを削除しますか？`)) return;
  const token = loadToken();
  if(!token){ alert('トークンが必要です'); return; }

  try {
    const { sha, data } = await getCurrentData(token);
    if(!data.dates[date]){ alert('データが見つかりません'); return; }
    delete data.dates[date];

    const json = JSON.stringify(data, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    const body = { message: `Delete indices ${date}`, content: encoded, branch: GH_BRANCH, sha };

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(res.ok){
      document.getElementById('save-status').innerHTML = `<div class="status st-ok">✓ ${date} を削除しました</div>`;
      loadDateList();
    } else {
      alert('削除に失敗しました');
    }
  } catch(e){
    alert('エラー: ' + e.message);
  }
}

      </div>`;}).join('');

// ---- GitHub レース選択（設定タブ）----
let ghData = null;
let currentRaceName = '';
let currentRaceClass = '';
let currentStartTime = '';

async function fetchRaceList(){
  const btn = document.getElementById('fetch-btn');
  const st = document.getElementById('fetch-status');
  btn.disabled = true;
  st.innerHTML = '<div class="status st-warn">読み込み中...</div>';

  try {
    const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('データが見つかりません。共有タブから保存してください。');
    const data = await res.json();

    // 新旧フォーマット対応
    if(data.dates){
      ghData = data.dates;
    } else if(data.races && data.races.length){
      ghData = {};
      ghData[data.date || '不明'] = { races: data.races };
    } else {
      throw new Error('レースデータが空です。共有タブから保存してください。');
    }

    const ds = document.getElementById('date-select');
    ds.innerHTML = '<option value="">-- 日付を選択 --</option>';
    Object.keys(ghData).sort().reverse().forEach(d => {
      // racesがない日付はスキップ（jra_oddsのみの日付など）
      if(!ghData[d].races || !ghData[d].races.length) return;
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = `${d}（${ghData[d].races.length}レース）`;
      ds.appendChild(opt);
    });

    // races がある日付のみを対象にする
    const dates = Object.keys(ghData).filter(d => ghData[d].races && ghData[d].races.length > 0);
    if(dates.length === 1){ ds.value = dates[0]; onDateChange(); }

    document.getElementById('date-area').style.display = 'block';
    st.innerHTML = `<div class="status st-ok">✓ ${dates.length}日分のデータを取得しました</div>`;
  } catch(e){
    st.innerHTML = `<div class="status st-err">${e.message}</div>`;
  }
  btn.disabled = false;
}

function onDateChange(){
  const date = document.getElementById('date-select').value;
  document.getElementById('race-select-area').style.display = 'none';
  document.getElementById('horse-preview').style.display = 'none';
  horses = [];
  if(!date || !ghData[date]) return;

  const rs = document.getElementById('race-select');
  rs.innerHTML = '<option value="">-- レースを選択 --</option>';
  ghData[date].races.forEach((race, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    const timeStr = race.startTime ? ` ${race.startTime}` : '';
    const classStr = race.raceClass ? ` ${race.raceClass}` : '';
    opt.textContent = `${race.raceName}${timeStr}${classStr}`;
    rs.appendChild(opt);
  });
  document.getElementById('race-select-area').style.display = 'block';
}

function onRaceChange(){
  const date = document.getElementById('date-select').value;
  const idx = document.getElementById('race-select').value;
  const preview = document.getElementById('horse-preview');
  if(!date || idx === '' || !ghData[date]){ preview.style.display = 'none'; return; }

  currentRace = ghData[date].races[parseInt(idx)] || null;  // グローバルに保存

  const race = ghData[date].races[parseInt(idx)];
  if(!race){ preview.style.display = 'none'; return; }

  const tot = race.horses.reduce((s,h) => s + h.pct, 0);

  // オッズ取得時刻を表示
  const oddsBar = document.getElementById('odds-info-bar');
  const oddsLabel = document.getElementById('odds-updated-label');
  const oddsUpdated = ghData[date].odds_updated;
  if(oddsBar) oddsBar.style.display = 'block';
  if(oddsUpdated && oddsLabel){
    const dt = new Date(oddsUpdated);
    const timeStr = dt.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    oddsLabel.textContent = `オッズ取得時刻: ${timeStr}`;
  } else if(oddsLabel){
    oddsLabel.textContent = 'オッズ未取得';
  }

  // オッズデータを取得（place_id → race_num の形式で保存されている）
  // race.venue から place_id を逆引き
  const VENUE_TO_ID = {
    '門別':'36','盛岡':'10','水沢':'11','船橋':'19','大井':'20',
    '川崎':'21','浦和':'22','金沢':'23','名古屋':'24','笠松':'25',
    '園田':'27','姫路':'28','高知':'30','佐賀':'31','帯広':'44'
  };
  const placeId = VENUE_TO_ID[race.venue] || null;
  const raceNumInt = parseInt((race.raceNum || '').replace('R',''));
  // オッズを全日付から検索（地方競馬odds + 中央競馬jra_odds両対応）
  let raceOdds = null;

  // JRA会場名リスト
  const JRA_VENUES = ['札幌','函館','福島','新潟','東京','中山','中京','京都','阪神','小倉'];
  const isJRA = JRA_VENUES.includes(race.venue);

  const allDates = Object.keys(ghData).sort().reverse();
  outer: for(const d of allDates){
    const dayData = ghData[d];
    if(!dayData) continue;

    if(isJRA){
      // 中央競馬: jra_odds["東京(土)"][1] 形式
      const jraOdds = dayData.jra_odds;
      if(!jraOdds) continue;
      for(const courseKey of Object.keys(jraOdds)){
        if(courseKey.includes(race.venue)){
          const courseOdds = jraOdds[courseKey];
          for(const rnum of [raceNumInt, String(raceNumInt)]){
            const candidate = courseOdds && courseOdds[rnum];
            if(candidate && typeof candidate === 'object' && Object.keys(candidate).length > 0){
              raceOdds = candidate;
              break outer;
            }
          }
        }
      }
    } else {
      // 地方競馬: odds[place_id][race_num] 形式
      const oddsData = dayData.odds;
      if(!oddsData) continue;
      for(const pid of [placeId, String(placeId), Number(placeId)]){
        const placeOdds = oddsData[pid];
        if(!placeOdds) continue;
        for(const rnum of [raceNumInt, String(raceNumInt)]){
          const candidate = placeOdds[rnum];
          if(candidate && typeof candidate === 'object' && Object.keys(candidate).length > 0){
            raceOdds = candidate;
            break outer;
          }
        }
      }
    }
  }

  horses = race.horses.map(h => {
    const o = raceOdds ? (raceOdds[h.num] || raceOdds[String(h.num)] || null) : null;
    return {
      num: h.num, pct: h.pct, name: h.name,
      norm: h.pct / tot,
      tanOdds: o ? (o.tan || null) : null,
      // fuku_min が 0 または未定義の場合は null扱い
      fukuOdds: o ? ((o.fuku_min && o.fuku_min > 0) ? o.fuku_min : null) : null
    };
  });
  horses.sort((a,b) => b.norm - a.norm);
  currentRaceName = race.raceName;
  currentRaceClass = race.raceClass || '';
  currentStartTime = race.startTime || '';

  // レース情報ヘッダー表示
  const hl = document.getElementById('horse-list');
  const classStr = race.raceClass || '';
  const timeStr = race.startTime || '';
  // オッズ取得時刻を全日付から検索（地方・中央両対応）
  const oddsUpdatedStr = (() => {
    const allD = Object.keys(ghData).sort().reverse();
    for(const d of allD){
      const dayData = ghData[d];
      if(!dayData) continue;
      let ou = null;
      if(isJRA){
        ou = dayData.jra_odds_updated;
        const jo = dayData.jra_odds;
        if(!ou || !jo) continue;
        if(!Object.keys(jo).some(k => k.includes(race.venue))) continue;
      } else {
        ou = dayData.odds_updated;
        const od = dayData.odds;
        if(!ou || !od) continue;
        if(!(od[placeId] || od[String(placeId)])) continue;
      }
      const dt = new Date(ou);
      return dt.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    }
    return null;
  })();

  hl.innerHTML = `<div style="background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-bottom:10px">
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">${race.raceName}</div>
    ${classStr ? `<div style="font-size:12px;color:var(--gold);margin-bottom:2px">${classStr}</div>` : ''}
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:2px">
      ${timeStr ? `<div style="font-size:12px;color:var(--text2)">発走 ${timeStr}</div>` : ''}
      ${oddsUpdatedStr
        ? `<div style="font-size:12px;color:var(--amber)">オッズ ${oddsUpdatedStr}時点</div>`
        : `<div style="font-size:12px;color:var(--text3)">オッズ未取得</div>`}
    </div>
  </div>`;

function parseAllRaces(raw){
  const races = [];
  const lines = raw.split(/[;\n]/).map(l => l.trim()).filter(l => l);
  let current = null;
  let currentHorses = [];

  for(const line of lines){
    // レースヘッダー検出: 年/月/日 競馬場 NR クラス名 時刻 ...
    const hm = line.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\S+)\s+(\d+R)\s+(.+?)\s+(\d{1,2}:\d{2})(?:\s|$)/);
    // 馬データ行の判定: 記号 + 半角スペース + 馬番 + 【 のパターン（レース名に☆が含まれる場合と区別）
    const isHorseLine = /[◎○▲△☆－]\s+\d+\s+【/.test(line);
    if(hm && !isHorseLine){
      if(current && currentHorses.length){
        races.push({ ...current, horses: currentHorses });
      }
      const month = hm[2], day = hm[3], rnum = hm[5];
      // 帯広ば→帯広 など会場名を正規化
      const venue = hm[4].replace('ば', '');
      const raceClass = hm[6].trim();
      const startTime = hm[7];
      current = {
        raceName: `${month}/${day} ${venue} ${rnum}`,
        raceClass,
        startTime,
        venue,
        raceNum: rnum
      };
      currentHorses = [];
      continue;
    }

    // 馬データ検出（体重あり・なし両対応・帯広ば対応）
    let m = line.match(/([◎○▲△☆－])\s+(\d+)\s+【\s*([\d.]+)%】\s+(.+?)\s+\S+\s+\d+\([+-]?\d+\)/);
    if(!m) m = line.match(/([◎○▲△☆－])\s+(\d+)\s+【\s*([\d.]+)%】\s+(.+?)\s+\S+\s+NaN/);
    // 帯広ばんえい形式（体重なし: 騎手名 [指数]）
    if(!m) m = line.match(/([◎○▲△☆－])\s+(\d+)\s+【\s*([\d.]+)%】\s+(.+?)\s+\S+\s+\[/);
    if(m && current){
      const markToRank = {'◎':1,'○':2,'▲':3,'△':4,'☆':5,'－':6};
      currentHorses.push({ rank: markToRank[m[1]]||6, num: parseInt(m[2]), pct: parseFloat(m[3]), name: m[4].trim() });
    }
  }
  if(current && currentHorses.length){
    races.push({ ...current, horses: currentHorses });
  }
  return races;
}

// 直近レースを自動選択
function selectNearestRace(){
  if(!ghData){
    alert('先に「一覧を読み込む」を押してください');
    return;
  }

  // JST現在時刻を取得
  const now = new Date();
  const jstOffset = 9 * 60; // JST = UTC+9
  const localOffset = -now.getTimezoneOffset(); // 分単位
  const jstNow = new Date(now.getTime() + (jstOffset - localOffset) * 60000);
  const todayStr = jstNow.toISOString().split('T')[0];
  const nowMin = jstNow.getHours() * 60 + jstNow.getMinutes();

  // 今日のデータを選択（racesがある日付のみ対象）
  const dateKeys = Object.keys(ghData).sort().filter(d => ghData[d].races && ghData[d].races.length > 0);
  let targetDate = dateKeys.find(d => d >= todayStr) || dateKeys[dateKeys.length - 1];
  if(!targetDate){ alert('レースデータが見つかりません。共有タブから保存してください。'); return; }

  const races = ghData[targetDate].races || [];
  if(!races.length){ alert('レースが見つかりません'); return; }

  // 各レースに発走分数を付与してソート
  const raceWithTime = races.map((race, originalIdx) => {
    if(!race.startTime) return null;
    const [h, m] = race.startTime.split(':').map(Number);
    const raceMin = h * 60 + m;
    const diff = raceMin - nowMin; // 正=未来、負=過去
    return { race, originalIdx, raceMin, diff };
  }).filter(Boolean);

  if(!raceWithTime.length){ alert('発走時刻が設定されたレースがありません'); return; }

  // 選択優先順位:
  // 1. 現在時刻以降（未発走）のレースで最も近いもの
  // 2. 全レース終了後は何も選択しない
  let best = null;

  // 発走2分前より前のレースのみ対象（締め切り-2分を過ぎたものは除外）
  const upcoming = raceWithTime.filter(r => r.diff > 2);
  if(upcoming.length > 0){
    // diffが最小（最も近い次のレース）
    best = upcoming.reduce((a, b) => a.diff < b.diff ? a : b);
  }

  // 日付セレクトを設定してレース一覧を更新
  const dateSelect = document.getElementById('date-select');
  dateSelect.value = targetDate;
  onDateChange();

  if(!best){
    document.getElementById('fetch-status').innerHTML =
      '<div class="status st-warn">本日のレースはすべて終了しています</div>';
    return;
  }

  // レースセレクトをoriginalIdxで設定
  setTimeout(() => {
    const raceSelect = document.getElementById('race-select');
    raceSelect.value = best.originalIdx;
    onRaceChange();
    const diffStr = `発走${best.diff}分前`;
    document.getElementById('fetch-status').innerHTML =
      `<div class="status st-ok">⏱ ${best.race.raceName} ${best.race.startTime}（${diffStr}）を選択しました</div>`;
  }, 150);
}

async function refreshOdds(){

  if(!date || idx === ''){

  if(btn){ btn.textContent = '🔄 更新中...'; btn.disabled = true; }

  try {

    const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('取得失敗');
    const data = await res.json();

    if(data.dates){

    // 現在選択中のレースを再表示
    onRaceChange();

  } catch(e){
    document.getElementById('fetch-status').innerHTML =
      `<div class="status st-err">更新失敗: ${e.message}</div>`;
  } finally {
    if(btn){ btn.textContent = '🔄 最新に更新'; btn.disabled = false; }
  }
}

let autoRefreshTimer = null;

function startAutoRefresh(){
  stopAutoRefresh();
  autoRefreshTimer = setInterval(async () => {

    const idx = document.getElementById('race-select')?.value;
    if(!date || idx === '') return;
    try {
      const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}?t=${Date.now()}`;
      const res = await fetch(url);
      if(!res.ok) return;
      const data = await res.json();
      if(data.dates) ghData = data.dates;
      // オッズ更新時刻を比較して変化を検知
      const prevUpdated = ghData[date]?.odds_updated;
      onRaceChange();
      const newUpdated = ghData[date]?.odds_updated;

      const label = document.getElementById('odds-updated-label');
      if(label){
        const now = new Date();
        const t = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        if(newUpdated){
          const dt = new Date(newUpdated);

          label.textContent = `オッズ取得: ${oddsT}（${t}更新）`;
        }
      }

      // オッズが新しく取得された場合に通知
      if(newUpdated && newUpdated !== prevUpdated){
        showToast('🏇 オッズが更新されました');
        // ブラウザ通知も送る
        sendPushNotification('競馬ケリー', 'オッズが更新されました');
      }
    } catch(e){}
  }, 60000); // 60秒ごと
}

// 単複タブの複勝オッズ変更時に再計算
function recalcTanfuku(){
  const inp = document.getElementById('tf-fuku-input');
  if(!inp) return;
  const fukuOdds = parseFloat(inp.value) || 0;
  const betEl  = document.getElementById('tf-fuku-bet');
  const payEl  = document.getElementById('tf-fuku-payout');
  const totEl  = document.getElementById('tf-total');
  if(!betEl || !payEl || !totEl) return;

  // tanfukuPickの情報を再取得
  const top5 = [...horses].filter(h=>h.tanOdds).sort((a,b)=>b.norm-a.norm).slice(0,5);
  const tf = top5.filter(h=>h.tanEV&&h.tanEV>100).sort((a,b)=>b.tanEV-a.tanEV)[0];
  if(!tf) return;

  const fund = parseInt(document.getElementById('fund').value) || 0;

  // 単勝賭け額（変わらない）
  const tanKf  = halfKelly(tf.norm, tf.tanOdds);
  const tanBet = tanKf > 0 ? Math.max(100, Math.floor(fund * tanKf / 100) * 100) : 0;

  // 複勝再計算
  let fukuBet = 0;
  if(fukuOdds >= 1.0){
    const fukuKf = halfKelly(tf.norm * 1.5, fukuOdds);
    fukuBet = fukuKf > 0 ? Math.max(100, Math.floor(fund * fukuKf / 100) * 100) : 0;
  }

  const total = tanBet + fukuBet;

  betEl.textContent  = fukuBet > 0 ? '¥' + fukuBet.toLocaleString() : '−';
  payEl.textContent  = fukuBet > 0 ? '¥' + Math.round(fukuBet * fukuOdds).toLocaleString() : '−';
  totEl.textContent  = '¥' + total.toLocaleString();
}

  betsEl.innerHTML = bets.map(b => `
    <div class="modal-row">
      <span style="color:var(--text)">${b.num}番 ${b.name}<span style="font-size:11px;color:var(--text3);margin-left:6px">単勝${b.odds}倍</span></span>
      <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--green)">¥${b.amount.toLocaleString()}</span>
    </div>`).join('');
  totalEl.textContent = `¥${total.toLocaleString()}`;
  statusEl.innerHTML = '<span style="color:var(--text2)">内容を確認して「投票する」を押してください</span>';
  confirmBtn.disabled = false;
  confirmBtn.textContent = '投票する';
  confirmBtn.onclick = confirmPurchaseJRA;

  _purchaseData = { courseName, raceNum, bets, isJRA: true };
  document.getElementById('purchase-modal').classList.add('show');
}

async function confirmPurchaseJRA(){
  if(!_purchaseData || !_purchaseData.isJRA) return;
  const { courseName, raceNum, bets } = _purchaseData;
  const statusEl = document.getElementById('modal-status');
  const confirmBtn = document.getElementById('modal-confirm-btn');
  const purchaseStatusEl = document.getElementById('purchase-status');

  confirmBtn.disabled = true;
  confirmBtn.textContent = '処理中...';
  statusEl.innerHTML = '<span style="color:var(--amber)">🔄 IPATに送信中...</span>';

  try {
    const res = await fetch(`${PURCHASE_SERVER}/purchase_jra`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Secret': PURCHASE_SECRET
      },
      body: JSON.stringify({ course_name: courseName, race_num: raceNum, bets })
    });

    if(res.ok){
      const data = await res.json();
      statusEl.innerHTML = `<span style="color:var(--green)">✅ ${data.message||'IPAT購入処理を開始しました'}</span>`;
      confirmBtn.textContent = '完了';
      if(purchaseStatusEl) purchaseStatusEl.innerHTML = '<span style="color:var(--green)">✅ IPAT投票処理を開始しました</span>';
      setTimeout(() => closePurchaseModal(), 3000);
    } else {
      const err = await res.json().catch(()=>({error: res.status}));
      statusEl.innerHTML = `<span style="color:var(--red)">❌ エラー: ${err.error||res.status}</span>`;
      confirmBtn.disabled = false;
      confirmBtn.textContent = '投票する';
    }
  } catch(e){
    statusEl.innerHTML = `<span style="color:var(--red)">❌ PCサーバーに接続できません<br><small>${e.message}</small></span>`;
    confirmBtn.disabled = false;
    confirmBtn.textContent = '投票する';
  }
}

async function confirmPurchase(){

      setTimeout(() => closePurchaseModal(), 3000);

  } catch(e){
    statusEl.innerHTML = `<span style="color:var(--red)">❌ PCサーバーに接続できません<br><small>${e.message}</small></span>`;
